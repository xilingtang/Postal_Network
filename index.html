<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Postal Network</title>

<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>

<style>
body { margin: 0; }

#map { width: 100%; height: 100vh; }

#panel {
  position: absolute;
  left: 10px;
  top: 10px;
  background: white;
  padding: 10px;
  width: 260px;
  border-radius: 6px;
  font-size: 14px;
}

#legend {
  position: absolute;
  right: 10px;
  bottom: 10px;
  background: white;
  padding: 10px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="panel"></div>
<div id="legend"></div>

<script>

// 初始化地图

const map = new maplibregl.Map({
  container: 'map',

  style: {
    version: 8,

    sources: {
      // ArcGIS raster 底图
      'arcgis-tiles': {
        type: 'raster',
        tiles: [
          'https://pro-ags1.dfs.un.org/arcgis/rest/services/ClearMap_WebPlain/MapServer/tile/{z}/{y}/{x}'
        ],
        tileSize: 256,
        attribution: '© UN Maps ClearMap'
      },

      // GeoJSON polygon
      'BNDA': {
        type: 'geojson',
        data: './data/BNDA.geojson'
      }
    },

    layers: [
      // raster 底图
      {
        id: 'arcgis-layer',
        type: 'raster',
        source: 'arcgis-tiles'
      },

      // polygon 边界线
      {
        id: 'polygon-outline',
        type: 'line',
        source: 'BNDA',

        paint: {
          'line-color': '#ccc',
          'line-width': 1,
          'line-opacity': 1
        }
      }
    ]
  },

  center: [35.85, 32.30],
  zoom: 1
});

// 图层配置

const layerConfig = [
  {
    group: "Post Office",
    layers: [
      { id: "postoffice_afg", name: "AFG", url: "data/postoffice_afg.geojson" },
      { id: "postoffice_col", name: "COL", url: "data/postoffice_col.geojson" },
      { id: "postoffice_com", name: "COM", url: "data/postoffice_com.geojson" },
      { id: "postoffice_jor", name: "JOR", url: "data/postoffice_jor.geojson" },
      { id: "postoffice_khm", name: "KHM", url: "data/postoffice_khm.geojson" },
      { id: "postoffice_lyb", name: "LYB", url: "data/postoffice_lyb.geojson" },
      { id: "postoffice_pan", name: "PAN", url: "data/postoffice_pan.geojson" },
      { id: "postoffice_sdn", name: "SDN", url: "data/postoffice_sdn.geojson" },
      { id: "postoffice_som", name: "SOM", url: "data/postoffice_som.geojson" },
      { id: "postoffice_swz", name: "SWZ", url: "data/postoffice_swz.geojson" },
      { id: "postoffice_tca", name: "TCA", url: "data/postoffice_tca.geojson" },
      { id: "postoffice_tgo", name: "TGO", url: "data/postoffice_tgo.geojson" },
      { id: "postoffice_tto", name: "TTO", url: "data/postoffice_tto.geojson" },
      { id: "postoffice_ury", name: "URY", url: "data/postoffice_ury.geojson" }
    ]
  },

  {
    group: "2IPD",
    subgroups: [
      { name: "2025", layers: build2IPDLayers("2025") },
      { name: "2024", layers: build2IPDLayers("2024") },
      { name: "2023", layers: build2IPDLayers("2023") },
      { name: "2022", layers: build2IPDLayers("2022") }
    ]
  }
];

const sourceCache = {};

// 工具函数 构建2IPD图层

function build2IPDLayers(year) {

  const fields = [
    "PDL",
    "Reliability",
    "Reach",
    "Relevance",
    "Resilience",
    "Score before bonus",
    "Bonus",
    "Score after bonus"
  ];

  return fields.map(f => ({
    id: `2IPD_${year}_${f}`,
    name: f,
    field: `2IPD_${year}_${f}`,
    year: year,
    url: `data/2IPD_${year}.geojson`
  }));
}

// 工具函数 开始状态下关闭所有图层

function toggleLayer(id, visible) {
  if (!map.getLayer(id)) return;

  map.setLayoutProperty(
    id,
    'visibility',
    visible ? 'visible' : 'none'
  );
}

// 工具函数 渲染图层

function getPaint(layer, geometry) {

  const field = layer.field;

  // 渲染图层 Post Office
  if (geometry === 'Point' || geometry === 'MultiPoint') {
    return {
      'circle-radius': 3,
      'circle-color': '#ff0000',
      'circle-stroke-width': 1,
      'circle-stroke-color': '#fff'
    };
  }

  // 渲染图层 2IPD
  if (layer.id.startsWith('2IPD') && field) {

    if (field.includes('PDL')) {
      return {
        "fill-color": [
          "match",
          ["get", field],
          1, "#c4161c",
          2, "#f15e38",
          3, "#f58221",
          4, "#e5a150",
          5, "#fcdb6e",
          6, "#9ccf81",
          7, "#5ebe90",
          8, "#2eb668",
          9, "#13a449",
          10, "#149145",
          "#ccc"
        ],
        "fill-opacity": 0.8,
        "fill-outline-color": "#000"
      };
    }

    const gradient = (stops) => ({
      "fill-color": [
        "case",
       // 如果字段不存在 / null / 空
        ["!", ["has", field]], "#ccc",

        ["==", ["get", field], null], "#ccc",

      // 否则正常渐变
        [
          "interpolate", ["linear"],
          ["to-number", ["get", field]],
          ...stops
        ]
      ],

      "fill-opacity": 0.8,
      "fill-outline-color": "#000"
    });

    if (field.includes("Reliability")) return gradient([0, "#eff3ff", 100, "#08306b"]);
    if (field.includes("Reach")) return gradient([0, "#e5f5e0", 100, "#00441b"]);
    if (field.includes("Relevance")) return gradient([0, "#ffffe5", 100, "#ffb300"]);
    if (field.includes("Resilience")) return gradient([0, "#efedf5", 100, "#3f007d"]);
    if (field.includes("Score before bonus")) return gradient([0, "#b10026", 50, "#ffffbf", 100, "#006837"]);
    if (field.includes("Bonus")) return gradient([0, "#fcbba1", 15, "#b10026"]);
    if (field.includes("Score after bonus")) return gradient([0, "#b10026", 50, "#ffffbf", 110, "#006837"]);
  }
}


// 工具函数 切换图例

function updateLegend(layerId) {

  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  legend.style.display = 'block';

  // ===== Post Office =====
  if (layerId.startsWith('postoffice')) {
    createPointLegend(legend);
    return;
  }

  // ===== 找配置 =====
  const layerConfigItem = allLayers.find(l => l.id === layerId);
  const field = layerConfigItem?.field;

  if (!field) {
    legend.style.display = 'none';
    return;
  }

  // ===== PDL =====
  if (field.includes('PDL')) {
    createPDLLegend(legend);
    return;
  }

  // ===== 渐变 =====
  const fillColor = map.getPaintProperty(layerId, 'fill-color');

  if (!fillColor) {
    legend.style.display = 'none';
    return;
  }

  createGradientLegendFromMapLibre(legend, layerId, fillColor);
}


// 工具函数 点图例

function createPointLegend(container) {

  container.style.display = 'block';

  const title = document.createElement('div');
  title.innerText = 'Post Office';
  title.style.fontWeight = 'bold';
  title.style.marginBottom = '6px';

  container.appendChild(title);

  const item = document.createElement('div');

  const dot = document.createElement('span');
  dot.style.width = '10px';
  dot.style.height = '10px';
  dot.style.backgroundColor = '#ff0000';
  dot.style.borderRadius = '50%';
  dot.style.display = 'inline-block';
  dot.style.marginRight = '6px';

  const label = document.createElement('span');
  label.innerText = 'Location';

  item.appendChild(dot);
  item.appendChild(label);
  container.appendChild(item);
}

// 工具函数 PDL图例

function createPDLLegend(container) {

  container.style.display = 'block';

  const title = document.createElement('div');
  title.innerText = 'PDL';
  title.style.fontWeight = 'bold';
  title.style.marginBottom = '6px';

  container.appendChild(title);

  // 新增一个横向容器
  const row = document.createElement('div');
  row.style.display = 'flex';
  row.style.flexWrap = 'wrap'; 
  row.style.gap = '8px'; 

  container.appendChild(row);

  const PDL_COLORS = {
    1: "#c4161c",
    2: "#f15e38",
    3: "#f58221",
    4: "#e5a150",
    5: "#fcdb6e",
    6: "#9ccf81",
    7: "#5ebe90",
    8: "#2eb668",
    9: "#13a449",
    10: "#149145"
  };

  for (let i = 1; i <= 10; i++) {

    const item = document.createElement('div');
    item.style.display = 'flex';
    item.style.alignItems = 'center';

    const colorBox = document.createElement('span');
    colorBox.style.width = '16px';
    colorBox.style.height = '16px';
    colorBox.style.backgroundColor = PDL_COLORS[i];
    colorBox.style.marginRight = '4px';

    const label = document.createElement('span');
    label.innerText = i;

    item.appendChild(colorBox);
    item.appendChild(label);

    row.appendChild(item);
  }
}

// 工具函数 渐变图例
function createGradientLegendFromMapLibre(container, layerId, fillColor) {

  container.style.display = 'block';

  // ===== 标题 =====
  const title = document.createElement('div');
  title.innerText = layerId
    .replace(/2IPD_\d+_/, '')
    .replace(/_/g, ' ');
  title.style.fontWeight = 'bold';
  title.style.marginBottom = '6px';
  container.appendChild(title);

  // ===== 非表达式（纯色）=====
  if (!Array.isArray(fillColor)) {
    const box = document.createElement('div');
    box.style.width = '16px';
    box.style.height = '16px';
    box.style.background = fillColor;
    box.style.marginBottom = '4px';
    container.appendChild(box);
    return;
  }

  // ===== 递归查找 interpolate =====
  function findInterpolate(expr) {
    if (!Array.isArray(expr)) return null;
    if (expr[0] === 'interpolate') return expr;

    for (const item of expr) {
      const found = findInterpolate(item);
      if (found) return found;
    }
    return null;
  }

  const interpolateExpr = findInterpolate(fillColor);

  if (!interpolateExpr) {
    console.warn('No interpolate found:', fillColor);
    return;
  }

  // ===== 提取 stops =====
  const stops = [];

  for (let i = 3; i < interpolateExpr.length; i += 2) {
    stops.push({
      value: Number(interpolateExpr[i]),
      color: interpolateExpr[i + 1]
    });
  }

  if (stops.length === 0) return;

  const min = stops[0].value;
  const max = stops[stops.length - 1].value;
  const range = max - min || 1;

  // ===== 生成渐变 =====
  const gradientStr = stops.map(s => {
    const percent = ((s.value - min) / range) * 100;
    return `${s.color} ${percent}%`;
  }).join(',');

  const bar = document.createElement('div');
  bar.style.width = '140px';
  bar.style.height = '12px';
  bar.style.background = `linear-gradient(to right, ${gradientStr})`;
  bar.style.marginBottom = '4px';

  container.appendChild(bar);

  // ===== 标签 =====
  const labels = document.createElement('div');
  labels.style.display = 'flex';
  labels.style.justifyContent = 'space-between';
  labels.style.width = '140px';

  const minLabel = document.createElement('span');
  minLabel.innerText = min;

  const maxLabel = document.createElement('span');
  maxLabel.innerText = max;

  labels.appendChild(minLabel);
  labels.appendChild(maxLabel);
  container.appendChild(labels);
}

// 加载所有图层

let allLayers = []; // 提到外面

map.on('load', async () => {

  allLayers = [];

  // 扁平化
  layerConfig.forEach(group => {
    if (group.layers) allLayers.push(...group.layers);

    if (group.subgroups) {
      group.subgroups.forEach(sub => {
        allLayers.push(...sub.layers);
      });
    }
  });

  // 加载数据
  const results = await Promise.all(
    allLayers.map(layer => {
      if (sourceCache[layer.url]) {
        return sourceCache[layer.url];
      }

      return fetch(layer.url)
        .then(res => res.json())
        .then(data => {
          sourceCache[layer.url] = data;
          return data;
        })
        .catch(err => {
          console.error(`Failed to load: ${layer.id}`, err);
          return null;
        });
    })
  );

  const popup = new maplibregl.Popup({
    closeButton: true,
    closeOnClick: false
  });

  // 添加图层
  allLayers.forEach((layer, index) => {

    const geojson = results[index];
    if (!geojson || !geojson.features?.length) return;

    // 共享 source（避免重复加载）
    if (!map.getSource(layer.url)) {
      map.addSource(layer.url, {
        type: 'geojson',
        data: geojson
      });
    }

    // 自动识别几何类型
    const geometry = geojson.features[0].geometry.type;

    let layerType = 'fill';
    if (geometry.includes('Point')) layerType = 'circle';
    else if (geometry.includes('Line')) layerType = 'line';

    map.addLayer({
      id: layer.id,
      type: layerType,
      source: layer.url,
      layout: { visibility: "none" },
      paint: getPaint(layer, geometry) 
    });

    // hover
    map.on('mouseenter', layer.id, () => {
      map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', layer.id, () => {
      map.getCanvas().style.cursor = '';
    });

  });

  // 当前可见图层
  function getVisibleLayerIds() {
    return allLayers
      .map(l => l.id)
      .filter(id =>
        map.getLayer(id) &&
        map.getLayoutProperty(id, 'visibility') === 'visible'
      );
  }

  // 点击出现弹窗
  map.on('click', (e) => {

    popup.remove();

    const visibleLayers = getVisibleLayerIds();
    if (!visibleLayers.length) return;

    const features = map.queryRenderedFeatures(e.point, {
      layers: visibleLayers
    });

    if (!features.length) return;

    const feature = features[0];
    const properties = feature.properties;
    const layerId = feature.layer.id;

    // 找到当前 layer 配置
    const layerConfigItem = allLayers.find(l => l.id === layerId);

    let html = '';

  // 2IPD（国家 + 当前字段）
    if (layerId.startsWith('2IPD')) {

      const field = layerConfigItem?.field;

    // 国家字段
      const country =
        properties["Country_Name"] ||
        "N/A";

      const value = properties[field];

    // 字段名美化
      const label = field
        .replace('2IPD_2025_', '')
        .replace(/_/g, ' ');

      html = `
        <div><b>Country:</b> ${country}</div>
        <div><b>${label}:</b> ${value ?? 'N/A'}</div>
      `;
    }

 
  // Post Office

  else if (layerId.startsWith('postoffice')) {

    const currentZoom = map.getZoom();

    map.flyTo({
      center: feature.geometry.coordinates,
      zoom: Math.max(currentZoom, 5),
      duration: 1200
    });

    html = '';

    for (const key in properties) {
      html += `<div><b>${key}:</b> ${properties[key]}</div>`;
    }
  }

  // fallback
  if (!html) {
    html = `<div>No data</div>`;
  }

  popup
    .setLngLat(e.lngLat)
    .setHTML(html)
    .addTo(map);
});

  // 图层切换
  window.toggleLayer = function(layerId, visible) {
    map.setLayoutProperty(
      layerId,
      'visibility',
      visible ? 'visible' : 'none'
    );
    popup.remove();
  };

});



// 创建面板
createLayerPanel();

// 图层控制面板
function createLayerPanel() {

  const panel = document.getElementById('panel');
  panel.innerHTML = '';

  layerConfig.forEach(group => {

    const details = document.createElement('details');
    details.open = false;

    const summary = document.createElement('summary');
    summary.innerText = group.group;

    details.appendChild(summary);

    const content = document.createElement('div');

    // ===== Post Office =====
    if (group.layers) {
      group.layers.forEach(layer => {
        content.appendChild(createLayerItem(layer, { type: 'checkbox' }));
      });
    }

    // ===== 2IPD YEARS =====
    if (group.subgroups) {

      const select = document.createElement('select');
      select.style.width = "100%";

      const container = document.createElement('div');

      content.appendChild(select);
      content.appendChild(container);

      let current = group.subgroups[0];

      group.subgroups.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.innerText = s.name;
        select.appendChild(opt);
      });

      const render = (sub) => {

        container.innerHTML = '';

        sub.layers.forEach(l => {
          container.appendChild(
            createLayerItem(l, {
              type: 'radio',
              group: '2IPD'
            })
          );
        });
      };

     
      select.onchange = (e) => {

        current = group.subgroups.find(s => s.name === e.target.value);

        // 关闭旧layer
        group.subgroups.forEach(s => {
          s.layers.forEach(l => {
            toggleLayer(l.id, false);
          });
        });

        // 清空 legend
        const legend = document.getElementById('legend');
        legend.innerHTML = '';
        legend.style.display = 'none';

        // 同时取消 radio 选中状态
        document.querySelectorAll('input[name="2IPD"]').forEach(el => {
          el.checked = false;
        });

        render(current);
      };

      select.value = current.name;
      render(current);
    }

    details.appendChild(content);
    panel.appendChild(details);
  });
}


// 图层项
function createLayerItem(layer, options = {}) {

  const { type = 'checkbox', group = '' } = options;

  const item = document.createElement('div');
  item.className = 'layer-item';

  const input = document.createElement('input');
  input.type = type;

  if (type === 'radio') {
    input.name = group; // 2IPD 单选
  }

  input.checked = false;

  input.onchange = () => {

    // 判断当前图层类型
    const is2IPD = layer.id.startsWith('2IPD');
    const isPost = layer.id.startsWith('postoffice');

    // 核心新增逻辑（互斥）

    if (input.checked) {

      if (isPost) {
        // 选 Post Office → 关闭所有 2IPD
        layerConfig.forEach(group => {
          group.subgroups?.forEach(sub => {
            sub.layers.forEach(l => {
              toggleLayer(l.id, false);
            });
          });
        });

        // 同步取消 radio UI
        document.querySelectorAll('input[name="2IPD"]').forEach(el => {
          el.checked = false;
        });
      }

      if (is2IPD) {
        // 选 2IPD → 关闭所有 Post Office
        layerConfig.forEach(group => {
          group.layers?.forEach(l => {
            toggleLayer(l.id, false);
          });
        });

        // 同步取消 checkbox UI
        document.querySelectorAll('.layer-item input[type="checkbox"]').forEach(el => {
          el.checked = false;
        });
      }
    }

    // 原有逻辑（2IPD 单选）
    if (type === 'radio') {
      layerConfig.forEach(group => {
        group.subgroups?.forEach(sub => {
          sub.layers.forEach(l => {
            toggleLayer(l.id, false);
          });
        });
      });
    }

    // 当前图层开关
    toggleLayer(layer.id, input.checked);

    // legend 控制
    const legend = document.getElementById('legend');

    if (input.checked) {
      updateLegend(layer.id);
    } else {
      const anyChecked = document.querySelectorAll(
        '.layer-item input:checked'
      ).length > 0;

      if (!anyChecked) {
        legend.innerHTML = '';
        legend.style.display = 'none';
      }
    }
  };

  const label = document.createElement('span');
  label.innerText = layer.name;

  item.appendChild(input);
  item.appendChild(label);

  return item;
}

</script>
</body>
</html>
